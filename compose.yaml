services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - OCTANE_SERVER=frankenphp
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=fretei
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - fretei_net

  # [INFRA] Worker responsável por consumir as filas assíncronas (CIOT e Publicação)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=fretei
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - fretei_net
    healthcheck:
      disable: true

  # [INFRA] Scheduler responsável por disparar as auto-liquidações e regras temporais
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    command: php artisan schedule:work
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=fretei
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - fretei_net
    healthcheck:
      disable: true

  # [INFRA] Malha de Eventos WebSockets (Laravel Reverb)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    command: php artisan reverb:start --host="0.0.0.0" --port=8082
    ports:
      - "8082:8082"
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=fretei
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - fretei_net
    healthcheck:
      disable: true

  redis:
    image: 'redis:alpine'
    ports:
      - '6379:6379'
    volumes:
      - 'fretei_redis:/data'
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    networks:
      - fretei_net

  pgsql:
    image: 'postgres:16-alpine'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fretei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - 'fretei_pgsql:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "fretei", "-U", "postgres"]
      retries: 3
      timeout: 5s
    networks:
      - fretei_net

  # MICROSERVIÇO DE RASTREAMENTO EM TEMPO REAL (GO)
  tracking:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080" 
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fretei_net

volumes:
  fretei_redis:
    driver: local
  fretei_pgsql:
    driver: local

networks:
  fretei_net:
    driver: bridge