services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # [SECURITY] Força o container a operar com o seu usuário do WSL, evitando arquivos travados como 'root'
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - OCTANE_SERVER=frankenphp
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=fretei
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      # Gestão de Estado delegada ao Redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - fretei_net

  redis:
    image: 'redis:alpine'
    ports:
      - '6379:6379'
    volumes:
      - 'fretei_redis:/data'
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    networks:
      - fretei_net

  pgsql:
    image: 'postgres:16-alpine'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fretei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - 'fretei_pgsql:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "fretei", "-U", "postgres"]
      retries: 3
      timeout: 5s
    networks:
      - fretei_net

  # =========================================================
  # MICROSERVIÇO DE RASTREAMENTO EM TEMPO REAL (GO)
  # =========================================================
  tracking:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    ports:
      # [INFRA] Evasão de porta: O host acessa na 8081, o container escuta na 8080.
      # Isso libera a 8080 para o seu uso nativo ou outros serviços.
      - "8081:8080" 
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fretei_net

volumes:
  fretei_redis:
    driver: local
  fretei_pgsql:
    driver: local

networks:
  fretei_net:
    driver: bridge